name: photo_sync
description: Android Flutter app for uploading DCIM/Camera photos to photo-folder.
publish_to: 'none'
version: 0.1.0+4

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.2
  photo_manager: ^3.6.3
  mime: ^2.0.0
  path: ^1.9.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  workmanager: ^0.6.0
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
